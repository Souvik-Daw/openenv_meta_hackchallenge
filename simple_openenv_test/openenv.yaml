name: simple-routing-env
version: "1.0.0"
description: "Minimal Prototype: Task Routing Environment"
spec_version: "1.0"

environment:
  entrypoint: "env.env:TaskRoutingEnv"

models:
  observation: "env.models:Observation"
  action: "env.models:Action"
  reward: "env.models:Reward"
  state: "env.models:State"

tasks:
  - id: 1
    name: "Payment Issue"
    description: "Clear mapping to billing."
    grader: "env.graders:grader_task_1"
  - id: 2
    name: "App Crash"
    description: "Slight ambiguity routing to tech."
    grader: "env.graders:grader_task_2"
  - id: 3
    name: "Vague Query"
    description: "Vague input routing to general."
    grader: "env.graders:grader_task_3"
